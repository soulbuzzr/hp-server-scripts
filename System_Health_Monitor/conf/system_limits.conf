# ================= CPU =================
CPU_ACTIVE_THRESHOLD=60 # CPU Load alert
CPU_TEMP_THRESHOLD=65   # CPU Temp Alert

# ================= HOST =================
HOST_NAME="🖥️ HP Linux Server"

# ================= GPU =================
GPU_TEMP_THRESHOLD=65

# ================= DISK =================
SSD_WEAR_VALUE_WARN=95

# Disk temperature threshold (°C)
# - TEMP_THRESHOLD is kept for backward compatibility with existing scripts.
DISK_TEMP_WARN=43
TEMP_THRESHOLD=43

REPORTED_UNCORRECT_THRESHOLD_INT=4 #Internal HDD count was 4 when started

# ===== DUST / COOLING DETECTION =====
# CPU considered "idle / light load" below this
DUST_CPU_ACTIVE_MAX=10      # %

# Temperature considered too high for low CPU
DUST_CPU_TEMP_MIN=55        # °C

# Condition must persist for this long (in minutes)
DUST_DETECT_DURATION=5

# Mean Absolute Deviation (MAD)
DUST_CPU_TEMP_MAD_MAX=3
